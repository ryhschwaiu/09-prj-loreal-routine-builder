<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal | Smart Routine &amp; Product Advisor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <img src="img/loreal-logo.png" alt="L'Oréal Logo" class="logo" />
        <h1 class="site-title">Smart Routine &amp; Product Advisor</h1>
      </header>

      <nav class="view-switch" aria-label="Page view switcher">
        <div class="view-switch-group" role="group" aria-label="View toggle">
          <button
            id="viewProductsBtn"
            type="button"
            class="view-switch-btn is-active"
            aria-pressed="true"
          >
            Products
          </button>
          <button
            id="viewChatBtn"
            type="button"
            class="view-switch-btn"
            aria-pressed="false"
          >
            Chat
          </button>
        </div>
        <button
          id="resetButton"
          type="button"
          class="reset-btn"
          data-bs-toggle="modal"
          data-bs-target="#resetConfirmModal"
          aria-label="Reset chat and selected products"
          title="Reset chat and selected products"
        >
          <i class="fa-solid fa-arrows-rotate" aria-hidden="true"></i>
          <span class="visually-hidden">Reset chat and selected products</span>
        </button>
      </nav>

      <!-- Category Filter -->
      <div class="search-section view-products-section">
        <div class="filter-field">
          <label for="categoryDropdownButton">Category</label>
          <div class="dropdown">
            <button
              class="btn dropdown-toggle category-dropdown-btn"
              type="button"
              id="categoryDropdownButton"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              All Products
            </button>
            <ul
              class="dropdown-menu category-dropdown-menu"
              id="categoryDropdownMenu"
              aria-labelledby="categoryDropdownButton"
            >
              <li>
                <button
                  type="button"
                  class="dropdown-item active"
                  data-category=""
                >
                  All Products
                </button>
              </li>
              <li>
                <button
                  type="button"
                  class="dropdown-item"
                  data-category="cleanser"
                >
                  Cleansers
                </button>
              </li>
              <li>
                <button
                  type="button"
                  class="dropdown-item"
                  data-category="moisturizer"
                >
                  Moisturizers & Treatments
                </button>
              </li>
              <li>
                <button
                  type="button"
                  class="dropdown-item"
                  data-category="skincare"
                >
                  Skincare
                </button>
              </li>
              <li>
                <button
                  type="button"
                  class="dropdown-item"
                  data-category="haircare"
                >
                  Haircare
                </button>
              </li>
              <li>
                <button
                  type="button"
                  class="dropdown-item"
                  data-category="makeup"
                >
                  Makeup
                </button>
              </li>
              <li>
                <button
                  type="button"
                  class="dropdown-item"
                  data-category="hair color"
                >
                  Hair Color
                </button>
              </li>
              <li>
                <button
                  type="button"
                  class="dropdown-item"
                  data-category="hair styling"
                >
                  Hair Styling
                </button>
              </li>
              <li>
                <button
                  type="button"
                  class="dropdown-item"
                  data-category="men's grooming"
                >
                  Men's Grooming
                </button>
              </li>
              <li>
                <button
                  type="button"
                  class="dropdown-item"
                  data-category="suncare"
                >
                  Suncare
                </button>
              </li>
              <li>
                <button
                  type="button"
                  class="dropdown-item"
                  data-category="fragrance"
                >
                  Fragrance
                </button>
              </li>
            </ul>
          </div>
        </div>

        <div class="filter-field">
          <label for="productSearch">Product Search</label>
          <input
            id="productSearch"
            type="search"
            placeholder="Search by name, brand, or keyword"
            autocomplete="off"
          />
        </div>
      </div>

      <!-- Products Grid -->
      <div
        id="productsContainer"
        class="products-grid view-products-section"
      ></div>

      <!-- Selected Products -->
      <div class="selected-products view-products-section">
        <div class="selected-header">
          <h2>Selected Products</h2>
          <div class="selected-actions">
            <span id="selectedCount" aria-live="polite">0 selected</span>
            <button id="clearSelected" type="button" class="clear-btn">
              Clear All
            </button>
          </div>
        </div>
        <div id="selectedProductsList"></div>
        <label class="web-search-toggle" for="webSearchToggle">
          <input id="webSearchToggle" type="checkbox" checked />
          <span>Use web search for current information</span>
        </label>
        <button id="generateRoutine" type="button" class="generate-btn">
          <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Routine
        </button>
      </div>

      <!------- Chat Area ------->
      <section class="chatbox view-chat-section">
        <h2>Let's Build Your Routine</h2>
        <div id="chatWindow" class="chat-window" aria-live="polite"></div>

        <form id="chatForm" class="chat-form">
          <label for="userInput" class="visually-hidden">Message</label>
          <input
            id="userInput"
            name="userInput"
            type="text"
            placeholder="Ask me about products or routines…"
            autocomplete="off"
            required
          />
          <button type="submit" id="sendBtn">
            <i class="fa-solid fa-paper-plane"></i>
            <span class="visually-hidden">Send</span>
          </button>
        </form>
      </section>

      <!------- Footer Links ------->
      <footer class="site-footer">
        <p>&copy; 2025 L'Oréal. All rights reserved.</p>
        <nav>
          <!-- These URLs are placeholders -->
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <div
      class="modal fade"
      id="resetConfirmModal"
      tabindex="-1"
      aria-labelledby="resetConfirmModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content reset-modal">
          <div class="modal-header">
            <h2 class="modal-title fs-5" id="resetConfirmModalLabel">
              Reset everything?
            </h2>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            This will clear your saved chat conversation and selected products.
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-danger"
              id="resetConfirmButton"
            >
              Reset
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- secrets.js can be removed when using Cloudflare Workers for API requests -->
    <script src="secrets.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
